- name: Install and migrate monitoring stack to Grafana Alloy
  hosts: monitoring_hosts
  gather_facts: false
  vars_files:
    - defaults/configure_monitoring_host_defaults.yml
    - defaults/install_scrapers_defaults.yml
    - defaults/install_alloy_defaults.yml
  vars:
     vars:
    monitoring_region: >-
      {{
        aws_region | default(
          hostvars[inventory_hostname]['placement']['region'] | default(
            hostvars[inventory_hostname]['ec2_region'] | default('unknown')
          )
        )
      }}
  tasks:
    - name: Fail if monitoring region cannot be determined
      when: monitoring_region == 'unknown'
      ansible.builtin.fail:
        msg: "Unable to determine monitoring region for host {{ inventory_hostname }}."

    - name: Build connection details for monitoring hosts
      delegate_to: localhost
      block:
        - name: Include build_connection_details role
          ansible.builtin.include_role:
            name: build_connection_details

    - name: Install required packages
      ansible.builtin.package:
        name:
          - cifs-utils
        state: present
      become: true

    - name: Unmount all existing mounts under /mnt
      ansible.builtin.shell: "sudo umount /mnt/* -l"
      changed_when: false
      ignore_errors: true

    - name: Gather EC2 instances info for current monitoring region
      amazon.aws.ec2_instance_info:
        region: "{{ monitoring_region }}"
        filters:
          "tag:MonitoringEnabled": "true"
      register: ec2_info
      delegate_to: localhost

    - name: Build list of monitoring-enabled instances
      ansible.builtin.set_fact:
        monitoring_enabled_instances: >-
          {{
            monitoring_enabled_instances | default([]) + [
              {
                'id': item.instance_id,
                'instance_name': instance_name,
                'mount_name': mount_name,
                'internal_ip': item.network_interfaces[0].private_ip_address
              }
            ]
          }}
      vars:
        instance_name: "{{ item.tags.instance | default('') }}"
        mount_name: "{{ item.tags.Instance | default(instance_name) }}"
      loop: "{{ ec2_info.instances | default([]) }}"
      when:
        - item.network_interfaces | length > 0
        - item.tags.instance is defined
        - item.tags.Instance is defined

    - name: Check Prometheus service status
      ansible.builtin.systemd:
        name: prometheus
      register: prometheus_status
      failed_when: false
      become: true

    - name: Check fluent-bit service status
      ansible.builtin.systemd:
        name: fluent-bit
      register: fluent_bit_status
      failed_when: false
      become: true

    - name: Set legacy service facts
      ansible.builtin.set_fact:
        prometheus_installed: >-
          {{ prometheus_status.status is defined and prometheus_status.status.LoadState == 'loaded' }}
        fluent_bit_installed: >-
          {{ fluent_bit_status.status is defined and fluent_bit_status.status.LoadState == 'loaded' }}

    - name: Stop legacy monitoring services before migration
      ansible.builtin.systemd:
        name: "{{ item.name }}"
        state: stopped
        enabled: false
      loop:
        - name: prometheus
          installed: "{{ prometheus_installed }}"
        - name: fluent-bit
          installed: "{{ fluent_bit_installed }}"
      when: item.installed | bool
      failed_when: false
      become: true

    - name: Configure Grafana RPM repository
      ansible.builtin.yum_repository:
        name: grafana
        description: grafana
        baseurl: "{{ alloy_repo_baseurl }}"
        repo_gpgcheck: true
        enabled: true
        gpgcheck: true
        gpgkey: "{{ alloy_repo_gpgkey }}"
        sslverify: true
        sslcacert: /etc/pki/tls/certs/ca-bundle.crt
      become: true

    - name: Install Grafana Alloy package
      ansible.builtin.package:
        name: alloy
        state: present
      become: true

    - name: Add smbcreds file for CIFS mounts
      ansible.builtin.copy:
        content: |
          username={{ smb_username }}
          password={{ smb_password }}
        dest: /root/.smbcreds
        mode: "0600"
        force: true
      become: true

    - name: Ensure CIFS mount directories exist
      ansible.builtin.file:
        path: "/mnt/{{ item.mount_name }}"
        state: directory
        mode: "0755"
      loop: "{{ monitoring_enabled_instances | default([]) }}"
      failed_when: false
      become: true

    - name: Mount CIFS log shares
      ansible.posix.mount:
        src: "//{{ item.internal_ip }}/LogFiles"
        path: "/mnt/{{ item.mount_name }}"
        fstype: cifs
        opts: "ro,credentials=/root/.smbcreds,vers=3.1.1,sec=ntlmssp,iocharset=utf8,_netdev,cache=none,actimeo=0,nolease,nofail"
        state: mounted
      loop: "{{ monitoring_enabled_instances | default([]) }}"
      become: true
      register: mount_results
      ignore_errors: true

    - name: Log failed mounts
      ansible.builtin.debug:
        msg: "Failed to mount //{{ item.item.internal_ip }}/LogFiles on /mnt/{{ item.item.mount_name }}: {{ item.msg | default('unknown error') }}"
      loop: "{{ mount_results.results | selectattr('failed', 'true') | list }}"
      loop_control:
        label: "/mnt/{{ item.item.mount_name }}"

    - name: Build Alloy log sources from successful mounts
      ansible.builtin.set_fact:
        alloy_log_sources: >-
          {{
            alloy_log_sources | default([]) + [
              {
                'instance_name': item.item.instance_name,
                'mount_name': item.item.mount_name
              }
            ]
          }}
      loop: "{{ mount_results.results | rejectattr('failed', 'defined') | list }}"

    - name: Deploy Alloy configuration
      ansible.builtin.template:
        src: templates/config.alloy.j2
        dest: /etc/alloy/config.alloy
        owner: root
        group: root
        mode: "0644"
      notify: Restart alloy
      become: true

    - name: Ensure Alloy systemd service enabled and started
      ansible.builtin.systemd:
        name: alloy
        enabled: true
        state: started
      become: true

    - name: Apply Alloy configuration before cleanup
      ansible.builtin.meta: flush_handlers

    - name: Remove fluent-bit package after migration
      ansible.builtin.package:
        name: fluent-bit
        state: absent
      when: fluent_bit_installed | bool
      become: true

    - name: Remove legacy monitoring files and data
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/fluent-bit
        - /opt/fluent-bit
        - /var/lib/fluent-bit
        - /etc/systemd/system/fluent-bit.service
        - /etc/yum.repos.d/fluent-bit.repo
        - /usr/lib/systemd/system/fluent-bit.service
        - /etc/prometheus
        - /var/lib/prometheus
        - /etc/systemd/system/prometheus.service
        - /usr/lib/systemd/system/prometheus.service
        - /usr/local/bin/prometheus
        - /usr/local/bin/promtool
        - /etc/default/prometheus
        - /etc/sysconfig/prometheus
      register: legacy_cleanup
      become: true

    - name: Reload systemd after legacy cleanup
      ansible.builtin.systemd:
        daemon_reload: true
      when: legacy_cleanup is changed
      become: true

  handlers:
    - name: Restart alloy
      ansible.builtin.systemd:
        name: alloy
        state: restarted
      become: true
