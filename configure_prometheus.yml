- name: Configure Prometheus on monitoring hosts
  hosts: monitoring_hosts
  gather_facts: false
  vars_files:
    - defaults/install_scrapers_defaults.yml
  tasks:
    - name: Build connection details for monitoring hosts
      delegate_to: localhost
      block:
        - name: Include build_connection_details role
          ansible.builtin.include_role:
            name: build_connection_details

    - name: Gather node facts
      ansible.builtin.setup:
        gather_subset:
          - hardware

    - name: Deploy Prometheus configuration
      ansible.builtin.template:
        src: templates/config.yml.j2
        dest: /etc/prometheus/prometheus.yml
        owner: prometheus
        group: prometheus
        mode: "0644"
      become: true
      notify: Reload prometheus

  handlers:
    - name: Reload prometheus
      ansible.builtin.systemd:
        name: prometheus
        state: reloaded
      become: true
