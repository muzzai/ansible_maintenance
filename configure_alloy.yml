---
- name: Gather EC2 data for Alloy configuration
  hosts: localhost
  gather_facts: false
  vars_files:
    - defaults/install_scrapers_defaults.yml
  vars:
    monitoring_region: "{{ aws_region | default('') }}"
  tasks:
    - name: Fail if monitoring region cannot be determined
      when: monitoring_region == ''
      ansible.builtin.fail:
        msg: "AWS region is not set"

    - name: Gather EC2 instances info
      amazon.aws.ec2_instance_info:
        region: "{{ monitoring_region }}"
      register: ec2_info

- name: Configure Grafana Alloy on monitoring hosts
  hosts: monitoring_hosts
  gather_facts: false
  vars_files:
    - defaults/configure_monitoring_host_defaults.yml
    - defaults/install_scrapers_defaults.yml
    - defaults/install_alloy_defaults.yml
  vars:
    ec2_instances: "{{ hostvars['localhost']['ec2_info'].instances | default([]) }}"
    monitoring_region: "{{ aws_region | default(hostvars[inventory_hostname]['placement']['region'] | default('unknown')) }}"
  tasks:
    - name: Fail if monitoring region cannot be determined
      when: monitoring_region == 'unknown'
      ansible.builtin.fail:
        msg: "Unable to determine monitoring region for host {{ inventory_hostname }}."

    - name: Build connection details for monitoring hosts
      delegate_to: localhost
      block:
        - name: Include build_connection_details role
          ansible.builtin.include_role:
            name: build_connection_details

    - name: Install required packages
      ansible.builtin.package:
        name:
          - nmap
          - cifs-utils
        state: present
      become: true

    - name: Unmount all existing mounts under /mnt
      ansible.builtin.shell: "umount /mnt/* -l"
      changed_when: false
      ignore_errors: true
      become: true

    - name: Build list of instances with internal IP and parsed Name
      ansible.builtin.set_fact:
        instances_with_445: >-
          {{
            instances_with_445 | default([]) + [
              {
                'id': item.instance_id,
                'name': instance_name,
                'name_suffix': name_suffix,
                'internal_ip': item.network_interfaces[0].private_ip_address
              }
            ]
          }}
      vars:
        instance_name: "{{ item.tags.Name | default('') }}"
        name_suffix: >-
          {{ instance_name | regex_replace('.*\(([^()]*)\)\s*$', '\1') if '(' in instance_name else '' }}
      loop: "{{ ec2_instances }}"
      when:
        - item.network_interfaces | length > 0
        - item.tags.Name is defined

    - name: Check if port 445 is open on each instance
      ansible.builtin.command: "nmap -Pn -p 445 {{ item.internal_ip }}"
      register: nmap_result
      loop: "{{ instances_with_445 }}"
      changed_when: false

    - name: Filter instances where port 445 is open
      ansible.builtin.set_fact:
        instances_with_445_open: >-
          {{
            instances_with_445 | zip(nmap_result.results) | selectattr('1.stdout', 'search', '445/tcp open') | map(attribute='0') | list
          }}

    - name: Add smbcreds file for CIFS mounts
      ansible.builtin.copy:
        content: |
          username={{ smb_username }}
          password={{ smb_password }}
        dest: /root/.smbcreds
        mode: "0600"
        force: true
      become: true

    - name: Ensure CIFS mount directories exist
      ansible.builtin.file:
        path: "/mnt/{{ item.name_suffix }}"
        state: directory
        mode: "0755"
      loop: "{{ instances_with_445_open }}"
      failed_when: false
      become: true

    - name: Mount CIFS log shares
      ansible.posix.mount:
        src: "//{{ item.internal_ip }}/LogFiles"
        path: "/mnt/{{ item.name_suffix }}"
        fstype: cifs
        opts: "ro,credentials=/root/.smbcreds,vers=3.1.1,sec=ntlmssp,iocharset=utf8,_netdev,cache=none,actimeo=0,nolease,nofail"
        state: mounted
      loop: "{{ instances_with_445_open }}"
      become: true
      register: mount_results
      ignore_errors: true

    - name: Log failed mounts
      ansible.builtin.debug:
        msg: "Failed to mount //{{ item.item.internal_ip }}/LogFiles on /mnt/{{ item.item.name_suffix }}: {{ item.msg | default('unknown error') }}"
      loop: "{{ mount_results.results | selectattr('failed', 'true') | list }}"
      loop_control:
        label: "/mnt/{{ item.item.name_suffix }}"

    - name: Discover mounted log source directories
      ansible.builtin.find:
        paths: /mnt
        file_type: directory
        recurse: false
      register: alloy_mount_dirs
      become: true

    - name: Build Alloy log sources from mounted directories
      ansible.builtin.set_fact:
        alloy_log_sources: "{{ alloy_log_sources | default([]) + [{'name_suffix': item.path | basename}] }}"
      loop: "{{ alloy_mount_dirs.files }}"

    - name: Deploy Alloy configuration
      ansible.builtin.template:
        src: templates/config.alloy-nohealthcheck.j2
        dest: /etc/alloy/config.alloy
        owner: root
        group: root
        mode: "0644"
      notify: Restart alloy
      become: true

    - name: Ensure Alloy service is enabled and started
      ansible.builtin.systemd:
        name: alloy
        enabled: true
        state: started
      become: true

  handlers:
    - name: Restart alloy
      ansible.builtin.systemd:
        name: alloy
        state: restarted
      become: true
